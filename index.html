<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>iROOM - Welcome</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f8f9fa; margin: 0; }
        h1 { color: #007BFF; margin-bottom: 5px; font-size: 2.5rem; }
        p { color: #666; margin-bottom: 40px; }
        .box-container { display: flex; gap: 20px; }
        .mode-box { width: 200px; padding: 40px 10px; background: white; border-radius: 20px; text-align: center; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; text-decoration: none; color: #333; border: 1px solid #eee; }
        .mode-box:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .teacher { border-top: 6px solid #007BFF; }
        .student { border-top: 6px solid #FF4136; }
        .icon { font-size: 3rem; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <h1>iROOM</h1>
    <p>AI Real-time Instrumental Learning Platform</p>
    <div class="box-container">
        <a href="teacher.html" class="mode-box teacher"><span class="icon">🎺</span><h3>Teacher</h3></a>
        <a href="student.html" class="mode-box student"><span class="icon">🎻</span><h3>Student</h3></a>
    </div>
</body>
</html>
