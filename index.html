<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>iROOM - Welcome</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; margin: 0; }
        h1 { color: #007BFF; margin-bottom: 30px; }
        .box-container { display: flex; gap: 20px; }
        .mode-box { width: 200px; padding: 40px 20px; background: white; border-radius: 20px; text-align: center; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; text-decoration: none; color: #333; }
        .mode-box:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .teacher { border-bottom: 8px solid #007BFF; }
        .student { border-bottom: 8px solid #FF4136; }
        .icon { font-size: 3rem; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>iROOM : AI Music Education</h1>
    <div class="box-container">
        <a href="teacher.html" class="mode-box teacher">
            <div class="icon">🎺</div>
            <h3>선생님 모드</h3>
            <p>Teacher Mode</p>
        </a>
        <a href="student.html" class="mode-box student">
            <div class="icon">🎻</div>
            <h3>학생 모드</h3>
            <p>Student Mode</p>
        </a>
    </div>
</body>
</html>
