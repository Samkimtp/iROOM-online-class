<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iROOM - 무한한 음악적 가능성</title>
    <style>
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: #fff; color: #333; overflow-x: hidden; }
        
        /* 헤더 & 로고 */
        header { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 100; background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); }
        .logo { font-size: 1.5rem; font-weight: 800; color: #007BFF; text-decoration: none; }
        .logo-dot { color: #FF4081; } /* 오로라 포인트 */

        /* 히어로 섹션 (오로라 그라디언트 배경) */
        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white; background: linear-gradient(135deg, #007BFF 0%, #8A2BE2 50%, #FF4081 100%); background-size: 400% 400%; animation: aurora-bg 15s ease infinite; padding: 0 20px; }
        
        .hero h1 { font-size: 3.5rem; font-weight: 900; margin-bottom: 20px; line-height: 1.2; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .hero p { font-size: 1.2rem; margin-bottom: 40px; opacity: 0.9; max-width: 600px; }

        /* 학생 입장 버튼 (Electric Blue) */
        .btn-enter { padding: 15px 40px; border-radius: 30px; background: white; color: #007BFF; font-weight: 700; font-size: 1.1rem; text-decoration: none; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-enter:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,123,255,0.3); }

        /* 배경 오로라 애니메이션 */
        @keyframes aurora-bg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">iROOM<span class="logo-dot">.</span></a>
    </header>

    <section class="hero">
        <h1>무한한 음악적 가능성,<br>iROOM에서 시작됩니다.</h1>
        <p>데이터 기반 맞춤형 레슨과 실시간 코칭으로,<br>당신의 연주를 한 단계 업그레이드하세요.</p>
        
        <a href="student.html" class="btn-enter">오늘의 수업 입장하기 🎺</a>
    </section>

</body>
</html>
