<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iROOM Live DashBoard</title>
    <style>
        :root { --main-blue: #007BFF; --aurora-purple: #8A2BE2; --bg-dark: #121212; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; display: flex; height: 100vh; background-color: #f8f9fa; }
        
        /* 헤더 디자인 강화 */
        header { height: 65px; background: white; border-bottom: 2px solid #eee; display: flex; align-items: center; padding: 0 30px; position: fixed; width: 100%; top: 0; z-index: 100; justify-content: space-between; box-sizing: border-box; }
        .logo { font-size: 1.4rem; font-weight: 800; color: var(--main-blue); text-decoration: none; }
        .session-info { font-size: 0.9rem; color: #666; font-weight: 500; }

        main { display: flex; width: 100%; height: 100%; padding-top: 65px; box-sizing: border-box; }
        
        /* 왼쪽: 수업 관리 대시보드 (디자인 대폭 수정) */
        #dashboard-section { flex: 7; background-color: var(--bg-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; color: white; padding: 40px; }
        .status-card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); width: 80%; max-width: 500px; text-align: center; }
        .status-card h2 { margin-top: 0; font-size: 2rem; background: linear-gradient(to right, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .control-panel { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; width: 100%; }
        input { padding: 15px; border-radius: 12px; border: none; background: rgba(255,255,255,0.9); font-size: 1rem; width: 100%; box-sizing: border-box; }
        
        /* 오른쪽: 실시간 노트 (스크립트 영역) */
        #note-section { flex: 3; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        .note-header { padding: 20px; border-bottom: 2px solid #eee; font-weight: bold; color: var(--main-blue); display: flex; justify-content: space-between; align-items: center; }
        #transcript-container { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background: #fff; }
        
        /* 자막 스타일 */
        .script-item { border-left: 4px solid var(--main-blue); padding-left: 15px; margin-bottom: 5px; }
        .original-text { font-size: 1rem; color: #1a1a1a; line-height: 1.5; }
        .timestamp { font-size: 0.75rem; color: #999; margin-bottom: 5px; }

        .btn { padding: 12px 25px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; transition: 0.3s; font-size: 1rem; }
        .btn-primary { background: var(--main-blue); color: white; }
        .btn-primary:hover { background: #0056b3; transform: scale(1.02); }
        .btn-save { background: #34a853; color: white; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">iROOM Dashboard</a>
        <div class="session-info" id="session-time">오늘의 레슨: 데이터 기반 스크립팅</div>
        <button class="btn btn-save" onclick="exportData()">수업 데이터 시트로 전송 🚀</button>
    </header>

    <main>
        <section id="dashboard-section">
            <div class="status-card" id="main-card">
                <h2>Lesson Ready</h2>
                <p>구글 미트 주소를 입력하면<br>자동으로 수업 환경이 구성됩니다.</p>
                <div class="control-panel">
                    <input type="text" id="meet-url" placeholder="https://meet.google.com/xxx-xxxx-xxx">
                    <button class="btn btn-primary" onclick="launchLesson()">수업 시작 (미트 팝업 + 자막 활성화)</button>
                </div>
            </div>
        </section>

        <section id="note-section">
            <div class="note-header">
                <span>실시간 레슨 스크립트</span>
                <span id="rec-status" style="color:#999;">● 대기</span>
            </div>
            <div id="transcript-container" id="transcript-list">
                </div>
        </section>
    </main>

    <script>
        const container = document.getElementById('transcript-container');
        const recStatus = document.getElementById('rec-status');
        const meetInput = document.getElementById('meet-url');
        const mainCard = document.getElementById('main-card');
        
        let speechData = []; // 구글 시트 전송을 위해 데이터를 담을 배열

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (Recognition) {
            recognition = new Recognition();
            recognition.lang = 'ko-KR';
            recognition.continuous = true;
            recognition.onresult = (event) => {
                const text = event.results[event.results.length - 1][0].transcript;
                addTranscript(text);
            };
        }

        function launchLesson() {
            const url = meetInput.value;
            if (url && url.startsWith('https://meet.google.com/')) {
                // 1. 미트를 별도 팝업창으로 띄움 (이게 핵심 변화!)
                window.open(url, 'iRoomLesson', 'width=1100,height=850,menubar=no,status=no');
                
                // 2. 왼쪽 대시보드 UI를 '수업 중' 모드로 변경
                mainCard.innerHTML = `
                    <h2 style="color:#34a853;">ON AIR</h2>
                    <p>현재 수업이 기록되고 있습니다.<br>미트 창과 이 창을 나란히 배치하세요.</p>
                    <div style="font-size:3rem; margin:20px 0;">🎙️</div>
                `;
                
                // 3. 자막 인식 시작
                if (recognition) {
                    recognition.start();
                    recStatus.innerText = "● 기록 중";
                    recStatus.style.color = "#ff4b4b";
                }
            } else {
                alert("정확한 Google Meet 주소를 입력해 주세요!");
            }
        }

        function addTranscript(text) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString();
            
            // 데이터 배열에 저장 (나중에 시트 전송용)
            speechData.push({ time: timeStr, content: text });

            const item = document.createElement('div');
            item.className = 'script-item';
            item.innerHTML = `
                <div class="timestamp">${timeStr}</div>
                <div class="original-text">${text}</div>
            `;
            container.appendChild(item);
            container.scrollTop = container.scrollHeight;
        }

        function exportData() {
            if(speechData.length === 0) {
                alert("저장할 데이터가 없습니다.");
                return;
            }
            console.log("전송될 데이터:", speechData);
            alert(speechData.length + "개의 문장이 구글 시트로 전송될 준비가 되었습니다! (GAS 연동 대기)");
        }
    </script>
</body>
</html>
