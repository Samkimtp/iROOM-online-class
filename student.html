<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>iROOM Student v8.0</title>
    <style>
        :root { --t-blue: #007BFF; --s-red: #FF4136; --bg: #f8f9fa; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 280px; background: #1a1a1a; color: white; padding: 25px; display: flex; flex-direction: column; }
        #chat-main { flex: 1; display: flex; flex-direction: column; background: white; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 75%; line-height: 1.4; font-size: 1rem; position: relative; }
        .bubble-S { align-self: flex-end; background: var(--s-red); color: white; border-bottom-right-radius: 2px; }
        .bubble-T { align-self: flex-start; background: #e9ecef; color: #333; border-bottom-left-radius: 2px; }
        .trans { display: block; font-size: 0.85rem; margin-top: 5px; opacity: 0.9; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 5px; }
        .bubble-T .trans { border-top: 1px solid rgba(0,0,0,0.1); color: var(--s-red); font-weight: bold; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--s-red); color: white; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: auto; }
        button:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="color:var(--s-red); margin-top:0;">iROOM Live</h2>
        <p style="font-size:0.85rem; color:#888;">AI Real-time Lesson</p>
        <label style="font-size:0.8rem; color:#888; margin-top:20px;">My Language</label>
        <select id="my-lang" style="width:100%; padding:10px; margin:8px 0; border-radius:5px; background:#333; color:white; border:none;">
            <option value="th">Thai (태국어)</option>
            <option value="en">English (영어)</option>
        </select>
        <button onclick="startSession()">Join Lesson (Mic ON)</button>
    </div>
    <div id="chat-main"><div id="chat-window"></div></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzOxGjLQX1nZZODTLK4AuRkENvx2ShNkgJFtvaKd1RzyBy2MqGWNzyxBKZ5geRQG3fa/exec";
        let lastTime = null;
        const windowDiv = document.getElementById('chat-window');

        function callGAS(params, callbackName) {
            const query = new URLSearchParams({...params, callback: callbackName}).toString();
            const script = document.createElement('script');
            script.src = `${GAS_URL}?${query}`;
            document.body.appendChild(script);
            document.body.removeChild(script);
        }

        function startSession() {
            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Recognition) return alert("Please use Chrome browser.");
            
            const recog = new Recognition();
            recog.lang = document.getElementById('my-lang').value === 'th' ? 'th-TH' : 'en-US';
            recog.continuous = true;
            recog.onresult = (e) => {
                const text = e.results[e.results.length - 1][0].transcript;
                addBubble('S', text, 'Translating...');
                callGAS({mode: 'chat', user: 'S', text: text, source: document.getElementById('my-lang').value, target: 'ko'}, 'cb_chat');
            };
            
            window.cb_chat = (res) => {
                const bubbles = document.querySelectorAll('.bubble-S');
                if(bubbles.length > 0) bubbles[bubbles.length-1].querySelector('.trans').innerText = "🌐 " + res.translated;
            };

            recog.start();
            document.querySelector('button').innerText = "🔴 Lesson Live";
            document.querySelector('button').style.background = "#444";
            
            setInterval(sync, 2000); // 2초마다 선생님 메시지 확인
        }

        function sync() {
            window.cb_sync = (d) => {
                if (d && d.user === 'T' && d.time !== lastTime) {
                    addBubble('T', d.original, d.translated);
                    lastTime = d.time;
                }
            };
            callGAS({mode: 'sync'}, 'cb_sync');
        }

        function addBubble(user, ori, trans) {
            const div = document.createElement('div');
            div.className = `bubble bubble-${user}`;
            div.innerHTML = `${ori} <span class="trans">${user==='S'?trans:'🌐 '+trans}</span>`;
            windowDiv.appendChild(div);
            windowDiv.scrollTop = windowDiv.scrollHeight;
        }
    </script>
</body>
</html>
