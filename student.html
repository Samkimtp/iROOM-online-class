<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iROOM - Dual Language Mode</title>
    <style>
        :root { --main-blue: #007BFF; --bg-light: #f8f9fa; --text-dark: #202124; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; display: flex; height: 100vh; background: var(--bg-light); color: var(--text-dark); }
        
        header { height: 65px; background: white; border-bottom: 2px solid #eee; display: flex; align-items: center; padding: 0 30px; position: fixed; width: 100%; top: 0; z-index: 100; justify-content: space-between; box-sizing: border-box; }
        .logo { font-size: 1.4rem; font-weight: 800; color: var(--main-blue); text-decoration: none; }
        
        main { display: flex; width: 100%; height: 100%; padding-top: 65px; box-sizing: border-box; }
        
        /* 왼쪽: 설정 대시보드 */
        #meet-control-section { flex: 5; background-color: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 40px; }
        .setup-box { background: rgba(255,255,255,0.1); padding: 35px; border-radius: 24px; text-align: left; width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.2); }
        .setting-item { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #aaa; }
        
        select, input { padding: 12px; border-radius: 10px; border: none; font-size: 1rem; width: 100%; box-sizing: border-box; background: #fff; }
        
        /* 오른쪽: 실시간 노트 및 번역 */
        #script-section { flex: 5; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        .script-header { padding: 20px; border-bottom: 2px solid #eee; background: #fff; display: flex; justify-content: space-between; align-items: center; }
        #transcript-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .script-item { border-left: 4px solid var(--main-blue); padding: 12px 15px; background: #f9f9f9; border-radius: 0 8px 8px 0; }
        .timestamp { font-size: 0.75rem; color: #999; margin-bottom: 6px; }
        .original-text { font-size: 1rem; font-weight: 600; color: #333; }
        .translated-box { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; display: flex; align-items: flex-start; gap: 8px; }
        .lang-tag { font-size: 0.7rem; background: #007BFF; padding: 2px 6px; border-radius: 4px; color: #fff; font-weight: bold; min-width: 30px; text-align: center;}
        .trans-text { font-size: 0.95rem; color: #007BFF; font-weight: 500; }

        .btn { padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; width: 100%; font-size: 1.1rem; transition: 0.3s; }
        .btn-primary { background: var(--main-blue); color: white; }
        .btn-success { background: #34a853; color: white; width: auto; font-size: 0.9rem; padding: 8px 15px;}
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">iROOM Console</a>
        <button class="btn btn-success" onclick="sendToGoogleSheet()">시트 저장 💾</button>
    </header>

    <main>
        <section id="meet-control-section">
            <div class="setup-box">
                <h2 style="margin-top:0; text-align:center;">Lesson Setup</h2>
                
                <div class="setting-item">
                    <label>Google Meet URL</label>
                    <input type="text" id="meet-url" placeholder="https://meet.google.com/xxx-xxxx-xxx">
                </div>

                <div class="setting-item">
                    <label>내가 말하는 언어 (Input Language)</label>
                    <select id="input-lang">
                        <option value="ko-KR">한국어 (Korean)</option>
                        <option value="en-US">English (영어)</option>
                        <option value="th-TH">Thai (태국어)</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label>학생이 볼 언어 (Output Language)</label>
                    <select id="output-lang">
                        <option value="th">Thai (태국어)</option>
                        <option value="en">English (영어)</option>
                        <option value="ko">Korean (한국어)</option>
                    </select>
                </div>

                <button class="btn btn-primary" id="start-btn" onclick="startIroomSession()">수업 시작 & 자막 켜기</button>
            </div>
        </section>

        <section id="script-section">
            <div class="script-header">
                <div style="font-weight:bold; color:var(--main-blue);">Live Translation Note</div>
                <div id="status-badge" style="font-size:0.8rem; color:#999;">● 대기 중</div>
            </div>
            <div id="transcript-container">
                </div>
        </section>
    </main>

    <script>
        const container = document.getElementById('transcript-container');
        const lessonData = [];
        
        let recognition;
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        function startIroomSession() {
            const url = document.getElementById('meet-url').value;
            const inputLang = document.getElementById('input-lang').value;
            
            if (!url.startsWith('https://meet.google.com/')) {
                alert("정확한 미트 주소를 입력해주세요!");
                return;
            }

            // 1. 미트 팝업
            window.open(url, 'iRoomLesson', 'width=1100,height=800');
            
            // 2. 음성 인식 설정
            if (Recognition) {
                recognition = new Recognition();
                recognition.lang = inputLang; // 여기서 내가 말하는 언어 설정
                recognition.continuous = true;
                recognition.interimResults = false;

                recognition.onresult = (event) => {
                    const text = event.results[event.results.length - 1][0].transcript;
                    processTranscript(text);
                };

                recognition.start();
                document.getElementById('status-badge').innerText = "● 실시간 기록 중";
                document.getElementById('status-badge').style.color = "#34a853";
                document.getElementById('start-btn').innerText = "수업 진행 중...";
                document.getElementById('start-btn').disabled = true;
            }
        }

        async function processTranscript(text) {
            const outputLang = document.getElementById('output-lang').value;
            const now = new Date();
            const timeStr = now.toLocaleTimeString();

            // 번역 시뮬레이션 (실제 API 연동 전 단계)
            let translated = "";
            if (outputLang === 'th') translated = "บันทึก: " + text; // 태국어 예시
            else if (outputLang === 'en') translated = "Note: " + text; // 영어 예시
            else translated = "기록: " + text;

            const item = document.createElement('div');
            item.className = 'script-item';
            item.innerHTML = `
                <div class="timestamp">${timeStr}</div>
                <div class="original-text">${text}</div>
                <div class="translated-box">
                    <span class="lang-tag">${outputLang.toUpperCase()}</span>
                    <span class="trans-text">${translated}</span>
                </div>
            `;
            container.appendChild(item);
            container.scrollTop = container.scrollHeight;

            lessonData.push({ time: timeStr, original: text, translated: translated });
        }

        function sendToGoogleSheet() {
            if (lessonData.length === 0) {
                alert("저장할 데이터가 없습니다.");
                return;
            }
            console.log("시트 전송 데이터:", lessonData);
            alert(lessonData.length + "개의 대화가 시트 저장 대기 중입니다.");
        }
    </script>
</body>
</html>
