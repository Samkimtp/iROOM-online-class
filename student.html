<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>iROOM Live - Student v7.0</title>
    <style>
        /* CSS 스타일은 Teacher와 동일, 색상만 Red */
        :root { --t-blue: #007BFF; --s-red: #FF4136; --bg: #f0f2f5; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; height: 100vh; }
        #sidebar { width: 300px; background: #1c1e21; color: white; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; }
        #chat-main { flex: 1; display: flex; flex-direction: column; background: white; }
        #chat-window { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 14px 18px; border-radius: 20px; max-width: 75%; line-height: 1.5; font-size: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .bubble-S { align-self: flex-end; background: var(--s-red); color: white; border-bottom-right-radius: 2px; }
        .bubble-T { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 2px; }
        .trans { display: block; font-size: 0.9rem; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 8px; }
        .bubble-T .trans { border-top: 1px solid rgba(0,0,0,0.1); color: var(--s-red); font-weight: bold; }
        #user-count { margin-top: auto; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px; font-size: 0.9rem; border: 1px solid var(--s-red); }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--s-red); color: white; font-weight: bold; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="color:var(--s-red);">iROOM Student</h2>
        <p style="font-size:0.85rem; color:#888;">Status: <span id="st-text" style="color:#fff;">Waiting</span></p>
        <label style="font-size:0.8rem; color:#aaa;">My Language</label>
        <select id="my-lang" style="width:100%; padding:10px; margin-top:8px; border-radius:8px; background:#2a2a2a; color:white; border:none;">
            <option value="th">Thai (태국어)</option>
            <option value="en">English (영어)</option>
        </select>
        <div id="user-count">👥 Online: <span id="count-num">?</span> (Teacher: <span id="remote-st">-</span>)</div>
        <button onclick="startSession()" style="margin-top:15px;">Join Lesson</button>
    </div>
    <div id="chat-main"><div id="chat-window"></div></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbywWXWw3bOz04ap7HRyHRrj8rXhiRSFpGJCm3o7ZTKw02lJZ2GRZLfumstwZobCj2mS/exec";
        let lastTime = null;
        const windowDiv = document.getElementById('chat-window');

        async function apiCall(params) {
            const query = new URLSearchParams(params).toString();
            try {
                const response = await fetch(`${GAS_URL}?${query}`);
                const text = await response.text();
                const json = JSON.parse(text.substring(text.indexOf('(') + 1, text.lastIndexOf(')')));
                return json;
            } catch (e) { return null; }
        }

        function startSession() {
            document.getElementById('st-text').innerText = "Mic On";
            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recog = new Recognition();
            recog.lang = document.getElementById('my-lang').value === 'th' ? 'th-TH' : 'en-US';
            recog.continuous = true;
            recog.onresult = async (e) => {
                const text = e.results[e.results.length - 1][0].transcript;
                const bubble = addBubble('S', text, 'Translating...');
                const res = await apiCall({
                    mode: 'chat', user: 'S', text: text,
                    source: document.getElementById('my-lang').value, target: 'ko',
                    callback: 'callback'
                });
                if(res) bubble.querySelector('.trans').innerText = "🌐 " + res.translated;
            };
            recog.start();
            setInterval(sync, 2000);
            setInterval(heartbeat, 10000);
            heartbeat();
        }

        async function sync() {
            const data = await apiCall({ mode: 'sync', callback: 'callback' });
            if (data && data.user === 'T' && data.time !== lastTime) {
                addBubble('T', data.original, data.translated);
                lastTime = data.time;
            }
        }

        async function heartbeat() {
            const res = await apiCall({ mode: 'heartbeat', user: 'S', callback: 'callback' });
            if (res) {
                document.getElementById('count-num').innerText = res.onlineCount;
                document.getElementById('remote-st').innerText = res.otherOnline ? "선생님 접속중" : "선생님 대기중";
            }
        }

        function addBubble(user, ori, trans) {
            const div = document.createElement('div');
            div.className = `bubble bubble-${user}`;
            div.innerHTML = `${ori} <span class="trans">${user==='S'?trans:'🌐 '+trans}</span>`;
            windowDiv.appendChild(div);
            windowDiv.scrollTop = windowDiv.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
