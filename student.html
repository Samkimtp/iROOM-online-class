<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>iROOM Student v6.7</title>
    <style>
        :root { --teacher-blue: #007BFF; --student-red: #FF4136; --bg: #f5f7f9; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        #control-panel { width: 350px; background: #1a1a1a; color: white; padding: 30px; box-sizing: border-box; display: flex; flex-direction: column; }
        #chat-area { flex: 1; display: flex; flex-direction: column; background: white; border-left: 1px solid #ddd; }
        #transcript-container { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px; border-radius: 12px; max-width: 85%; line-height: 1.5; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .msg-S { align-self: flex-end; background: #fff1f0; border-right: 5px solid var(--student-red); color: #842029; }
        .msg-T { align-self: flex-start; background: #e7f3ff; border-left: 5px solid var(--teacher-blue); color: #004085; }
        .timestamp { font-size: 0.7rem; color: #999; margin-bottom: 5px; font-weight: bold; }
        .translated { font-weight: bold; display: block; margin-top: 8px; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 8px; color: var(--student-red); }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; background: var(--student-red); color: white; }
        input, select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; }
        label { font-size: 0.85rem; color: #aaa; margin-top: 15px; display: block; }
    </style>
</head>
<body>
    <div id="control-panel">
        <h2 style="color:var(--student-red); margin-top:0;">iROOM Student</h2>
        <hr style="border:0.5px solid #333; width:100%;">
        <label>Google Meet URL</label>
        <input type="text" id="meet-url" placeholder="https://meet.google.com/...">
        <label>My Language (Input)</label>
        <select id="in-lang"><option value="th">Thai (태국어)</option><option value="en">English (영어)</option></select>
        <button class="btn" onclick="initStudent()">Join Lesson</button>
        <div id="status" style="margin-top:20px; font-size:0.8rem; text-align:center; color:#555;">● Ready</div>
    </div>
    <div id="chat-area"><div id="transcript-container"></div></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzlFaUJmZuSo2I5ekgKcgQLQtJlocsYzbeDaXP05mEmOyHDjGnVTO8E22bEASExk15S/exec";
        const container = document.getElementById('transcript-container');
        let lastMsgTime = null;

        function initStudent() {
            const url = document.getElementById('meet-url').value;
            if (url) window.open(url, 'iRoomLesson', 'width=1000,height=700');

            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (Recognition) {
                const recog = new Recognition();
                recog.lang = document.getElementById('in-lang').value === 'th' ? 'th-TH' : 'en-US';
                recog.continuous = true;
                recog.onresult = (e) => {
                    const text = e.results[e.results.length - 1][0].transcript;
                    renderMsg('S', text, 'Translating...');
                    sendToDB('S', text);
                };
                recog.start();
                document.getElementById('status').innerText = "● Mic Active";
                document.getElementById('status').style.color = "#34a853";
            }
            setInterval(syncDB, 2000);
        }

        function sendToDB(user, text) {
            const src = document.getElementById('in-lang').value;
            const cb = 'cb_' + Date.now();
            window[cb] = (res) => {
                const lastTrans = container.querySelector('.msg-S:last-child .translated');
                if(lastTrans) lastTrans.innerText = "🌐 " + res.translated;
                delete window[cb];
            };
            const script = document.createElement('script');
            script.src = `${GAS_URL}?mode=chat&user=${user}&text=${encodeURIComponent(text)}&source=${src}&target=ko&callback=${cb}`;
            document.body.appendChild(script);
        }

        function syncDB() {
            const cb = 'sync_' + Date.now();
            window[cb] = (data) => {
                if (data.user === 'T' && data.time !== lastMsgTime) {
                    renderMsg('T', data.original, data.translated);
                    lastMsgTime = data.time;
                }
                delete window[cb];
            };
            const script = document.createElement('script');
            script.src = `${GAS_URL}?mode=sync&callback=${cb}`;
            document.body.appendChild(script);
        }

        function renderMsg(user, ori, trans) {
            const div = document.createElement('div');
            div.className = `msg msg-${user}`;
            div.innerHTML = `<div class="timestamp">${user==='S'?'Me':'Teacher'}</div>${ori}<span class="translated">${trans}</span>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
