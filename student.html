<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iROOM Console v6 - Live Translation</title>
    <style>
        :root { --main-blue: #007BFF; --bg-light: #f8f9fa; --text-dark: #202124; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; display: flex; height: 100vh; background: var(--bg-light); color: var(--text-dark); }
        header { height: 65px; background: white; border-bottom: 2px solid #eee; display: flex; align-items: center; padding: 0 30px; position: fixed; width: 100%; top: 0; z-index: 100; justify-content: space-between; box-sizing: border-box; }
        .logo { font-size: 1.4rem; font-weight: 800; color: var(--main-blue); text-decoration: none; }
        main { display: flex; width: 100%; height: 100%; padding-top: 65px; box-sizing: border-box; }
        #control-section { flex: 4; background-color: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 40px; }
        .setup-box { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.2); }
        .setting-item { margin-bottom: 15px; }
        label { font-size: 0.85rem; color: #aaa; display: block; margin-bottom: 5px; }
        select, input { padding: 12px; border-radius: 10px; border: none; font-size: 1rem; width: 100%; box-sizing: border-box; }
        #script-section { flex: 6; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        .script-header { padding: 20px; border-bottom: 2px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        #transcript-container { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .script-item { border-left: 5px solid var(--main-blue); padding: 12px 15px; background: #fdfdfd; border-radius: 0 10px 10px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .timestamp { font-size: 0.75rem; color: #999; margin-bottom: 5px; }
        .original-text { font-size: 1.05rem; font-weight: 600; color: #333; }
        .translated-box { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #eee; color: var(--main-blue); font-weight: 500; font-size: 1rem; }
        .btn { padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; width: 100%; transition: 0.3s; }
        .btn-primary { background: var(--main-blue); color: white; font-size: 1.1rem; }
        .btn-success { background: #34a853; color: white; width: auto; font-size: 0.9rem; padding: 8px 15px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">iROOM Console v6</a>
        <button class="btn btn-success" onclick="downloadCSV()">수업 내용 저장 (.csv) 💾</button>
    </header>

    <main>
        <section id="control-section">
            <div class="setup-box">
                <h3 style="margin-top:0; text-align:center;">Lesson Setup</h3>
                <div class="setting-item">
                    <label>Google Meet URL</label>
                    <input type="text" id="meet-url" placeholder="주소를 입력하세요">
                </div>
                <div class="setting-item">
                    <label>내 언어 (내가 말할 언어)</label>
                    <select id="input-lang">
                        <option value="ko">한국어 (Korean)</option>
                        <option value="en">English (영어)</option>
                        <option value="th">Thai (태국어)</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>상대방 언어 (번역될 언어)</label>
                    <select id="output-lang">
                        <option value="th">Thai (태국어)</option>
                        <option value="en">English (영어)</option>
                        <option value="ko">Korean (한국어)</option>
                    </select>
                </div>
                <button class="btn btn-primary" id="start-btn" onclick="startLesson()">수업 시작 & 기록</button>
            </div>
        </section>

        <section id="script-section">
            <div class="script-header">
                <div style="font-weight:bold; color:var(--main-blue);">실시간 번역 엔진 가동 중</div>
                <div id="status" style="font-size:0.8rem; color:#999;">● 대기 중</div>
            </div>
            <div id="transcript-container"></div>
        </section>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycby65f1EoCFo5PH55qMS-emeyYmF1ylEMDdDaX_iniBMmFf_hYIw9GcTZcMQVA2hEiZZ/exec";
        const container = document.getElementById('transcript-container');
        let lessonLog = [];
        let recognition;

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        function startLesson() {
            const url = document.getElementById('meet-url').value;
            const inputLangFull = document.getElementById('input-lang').value;
            
            if (!url.startsWith('https://meet.google.com/')) {
                alert("정확한 미트 주소를 입력해주세요!");
                return;
            }

            window.open(url, 'iRoomWindow', 'width=1100,height=800');

            if (Recognition) {
                recognition = new Recognition();
                // 음성인식 언어 설정 (ko-KR, en-US, th-TH)
                recognition.lang = inputLangFull === 'ko' ? 'ko-KR' : (inputLangFull === 'en' ? 'en-US' : 'th-TH');
                recognition.continuous = true;
                recognition.interimResults = false;

                recognition.onresult = (event) => {
                    const speechText = event.results[event.results.length - 1][0].transcript;
                    executeTranslation(speechText);
                };

                recognition.start();
                document.getElementById('status').innerText = "● 실시간 엔진 작동 중";
                document.getElementById('status').style.color = "#34a853";
                document.getElementById('start-btn').innerText = "세션 진행 중...";
                document.getElementById('start-btn').disabled = true;
            }
        }

        async function executeTranslation(text) {
            const source = document.getElementById('input-lang').value;
            const target = document.getElementById('output-lang').value;
            const time = new Date().toLocaleTimeString();

            try {
                // 대표님이 만드신 GAS 서버에 번역 요청
                const response = await fetch(`${GAS_URL}?text=${encodeURIComponent(text)}&source=${source}&target=${target}`);
                const translatedText = await response.text();

                // 화면에 표시
                const item = document.createElement('div');
                item.className = 'script-item';
                item.innerHTML = `
                    <div class="timestamp">${time} [${source} → ${target}]</div>
                    <div class="original-text">${text}</div>
                    <div class="translated-box">🌐 ${translatedText}</div>
                `;
                container.appendChild(item);
                container.scrollTop = container.scrollHeight;

                // 데이터 로그 저장
                lessonLog.push({ time, source, target, original: text, translated: translatedText });
            } catch (e) {
                console.error("Translation Error:", e);
            }
        }

        function downloadCSV() {
            if (lessonLog.length === 0) { alert("저장할 데이터가 없습니다."); return; }
            let csvContent = "\uFEFF시간,발화언어,타겟언어,원문,번역문\n";
            lessonLog.forEach(row => {
                csvContent += `"${row.time}","${row.source}","${row.target}","${row.original}","${row.translated}"\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `iROOM_Lesson_${new Date().getTime()}.csv`;
            link.click();
        }
    </script>
</body>
</html>
