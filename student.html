<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iROOM Student v8.6</title>
    <style>
        :root { --t-blue: #007BFF; --s-red: #FF4136; --bg: #f0f2f5; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 280px; background: #1c1c1e; color: white; padding: 30px 20px; display: flex; flex-direction: column; }
        h2 { color: var(--s-red); font-size: 1.8rem; margin: 0; }
        .desc { font-size: 0.85rem; color: #8e8e93; margin-bottom: 30px; }
        label { font-size: 0.75rem; color: #8e8e93; font-weight: bold; margin-bottom: 8px; display: block; }
        select { width: 100%; padding: 12px; border-radius: 12px; background: #2c2c2e; color: white; border: none; font-size: 1rem; margin-bottom: 20px; }
        #chat-main { flex: 1; display: flex; flex-direction: column; background: #ffffff; }
        #chat-window { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 14px 18px; border-radius: 20px; max-width: 80%; line-height: 1.5; font-size: 1.05rem; }
        .bubble-S { align-self: flex-end; background: var(--s-red); color: white; border-bottom-right-radius: 4px; }
        .bubble-T { align-self: flex-start; background: white; color: #1c1c1e; border-bottom-left-radius: 4px; border: 1px solid #e5e5ea; }
        .trans { display: block; font-size: 0.9rem; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(0,0,0,0.05); }
        .bubble-T .trans { color: var(--s-red); font-weight: 600; }
        .btn-start { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--s-red); color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: auto; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>iROOM S</h2>
        <p class="desc">학생 모드 (v8.6)</p>
        <label>나의 언어</label>
        <select id="my-lang">
            <option value="th">태국어 (Thai)</option>
            <option value="en">English (영어)</option>
            <option value="vi">Vietnamese (베트남어)</option>
        </select>
        <button id="main-btn" class="btn-start" onclick="startSession()">레슨 참여</button>
    </div>
    <div id="chat-main"><div id="chat-window"></div></div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzOxGjLQX1nZZODTLK4AuRkENvx2ShNkgJFtvaKd1RzyBy2MqGWNzyxBKZ5geRQG3fa/exec";
    
    // [수정] 페이지를 여는 순간의 시간을 기록해서, 이보다 이전(과거) 대화는 무시합니다.
    let startTime = new Date().getTime(); 
    let lastMsgHash = ""; 
    const windowDiv = document.getElementById('chat-window');

        function callGAS(params, callbackName) {
            const query = new URLSearchParams({...params, callback: callbackName, _t: new Date().getTime()}).toString();
            const script = document.createElement('script');
            script.src = `${GAS_URL}?${query}`;
            document.body.appendChild(script);
            document.body.removeChild(script);
        }

        function startSession() {
            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const myLang = document.getElementById('my-lang').value;
            const recog = new Recognition();
            recog.lang = (myLang === 'th') ? 'th-TH' : (myLang === 'en' ? 'en-US' : 'vi-VN');
            recog.continuous = true;
            recog.onresult = (e) => {
                const text = e.results[e.results.length - 1][0].transcript;
                addBubble('S', text, 'Translating...');
                // 학생 -> 선생님(ko) 번역 요청
                callGAS({mode: 'chat', user: 'S', text: text, source: myLang, target: 'ko'}, 'cb_chat');
            };
            window.cb_chat = (res) => {
                const bubbles = document.querySelectorAll('.bubble-S');
                if(bubbles.length > 0) bubbles[bubbles.length-1].querySelector('.trans').innerText = "🌐 " + res.translated;
            };
            recog.start();
            setInterval(sync, 2000);
            document.getElementById('main-btn').innerText = "🔴 참여 중";
        }

function sync() {
        window.cb_sync = (d) => {
            const currentHash = d.original + d.time;
            
            // [수정] d.time > startTime 조건이 핵심입니다!
if (d && d.time > startTime && currentHash !== lastMsgHash && d.original !== "") {
    // 학생 화면에서는 가져오는 데이터(d.user)가 'T'일 때만 화면에 그리면 됩니다.
    if (d.user === 'T') {
        addBubble('T', d.original, d.translated);
    }
    lastMsgHash = currentHash;
}
        };
        callGAS({mode: 'sync'}, 'cb_sync');
    }

        function addBubble(user, ori, trans) {
            const div = document.createElement('div');
            div.className = `bubble bubble-${user}`;
            div.innerHTML = `<div>${ori}</div><div class="trans">${user==='S' ? '' : '🌐 '}${trans}</div>`;
            windowDiv.appendChild(div);
            windowDiv.scrollTop = windowDiv.scrollHeight;
        }
    </script>
</body>
</html>
