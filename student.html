<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iROOM Lesson DashBoard</title>
    <style>
        body { margin: 0; font-family: 'Pretendard', sans-serif; display: flex; height: 100vh; overflow: hidden; background-color: #f5f7fa; }
        header { height: 60px; background: white; border-bottom: 1px solid #eee; display: flex; align-items: center; padding: 0 20px; position: fixed; width: 100%; top: 0; z-index: 10; justify-content: space-between;}
        .logo { font-size: 1.2rem; font-weight: 800; color: #007BFF; text-decoration: none; }
        main { display: flex; width: 100%; height: 100%; padding-top: 60px; }
        
        /* 왼쪽: 안내 및 대시보드 영역 */
        #meet-section { flex: 7; background-color: #202124; display: flex; flex-direction: column; position: relative; }
        #video-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; padding: 20px; }
        .meet-controls { height: 80px; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; gap: 15px; width: 100%; }
        
        /* 오른쪽: 실시간 노트 영역 */
        #note-section { flex: 3; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; box-shadow: -2px 0 10px rgba(0,0,0,0.05); }
        .note-header { padding: 15px 20px; border-bottom: 2px solid #eee; font-weight: bold; color: #007BFF; display: flex; justify-content: space-between; align-items: center; }
        #status { font-size: 0.8rem; color: #34a853; display: flex; align-items: center; gap: 5px; }
        .status-dot { width: 8px; height: 8px; background: #34a853; border-radius: 50%; animation: pulse 1.5s infinite; }
        #transcript-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .script-item { animation: fadeIn 0.5s; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
        .original-text { font-size: 0.95rem; color: #333; font-weight: 500; }
        .translated-text { font-size: 0.85rem; color: #666; margin-top: 4px; font-style: italic; }
        .timestamp { font-size: 0.7rem; color: #999; margin-bottom: 2px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .btn { padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-primary { background: #007BFF; color: white; }
        .btn-outline { background: white; color: #007BFF; border: 1px solid #007BFF; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #ccc; width: 300px; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">iROOM Student</a>
        <button class="btn btn-outline" onclick="saveToSheet()">수업 종료 및 데이터 저장 💾</button>
    </header>
    <main>
        <section id="meet-section">
            <div id="video-container">
                <h2 id="display-title">수업 준비 완료</h2>
                <p id="display-sub">아래에 Google Meet 주소를 입력하고 '수업 시작'을 눌러주세요.</p>
            </div>
            <div class="meet-controls">
                <input type="text" id="meet-url" placeholder="https://meet.google.com/xxx-xxxx-xxx">
                <button class="btn btn-primary" onclick="loadMeetAndStart()">수업 시작 & 자막 켜기</button>
            </div>
        </section>
        <section id="note-section">
            <div class="note-header">
                <span>Live Lesson Script</span>
                <div id="status"><span class="status-dot"></span><span>대기 중</span></div>
            </div>
            <div id="transcript-container"></div>
        </section>
    </main>

    <script>
        const container = document.getElementById('transcript-container');
        const statusText = document.getElementById('status').querySelector('span:last-child');
        const meetUrlInput = document.getElementById('meet-url');
        const displayTitle = document.getElementById('display-title');
        const displaySub = document.getElementById('display-sub');

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (Recognition) {
            recognition = new Recognition();
            recognition.lang = 'ko-KR';
            recognition.continuous = true;
            recognition.onresult = (event) => {
                const text = event.results[event.results.length - 1][0].transcript;
                addTranscript(text);
            };
        }

        function loadMeetAndStart() {
            const url = meetUrlInput.value;
            if (url && url.startsWith('https://meet.google.com/')) {
                // 1. 구글 미트 새 창 팝업 (보안 문제 해결)
                window.open(url, 'iRoomMeet', 'width=1000,height=800');
                
                // 2. 화면 UI 변경
                displayTitle.innerText = "📹 화상 회의 진행 중";
                displaySub.innerText = "회의는 별도의 창에서 열렸습니다. 이 창을 끄지 마세요!";
                
                // 3. 자막 인식 시작
                if (recognition) {
                    recognition.start();
                    statusText.innerText = "실시간 기록 중";
                }
            } else {
                alert("올바른 Google Meet 주소를 입력해주세요!");
            }
        }

        function addTranscript(text) {
            const now = new Date();
            const timeStr = now.getHours() + ":" + now.getMinutes() + ":" + now.getSeconds();
            const item = document.createElement('div');
            item.className = 'script-item';
            item.innerHTML = `
                <div class="timestamp">${timeStr}</div>
                <div class="original-text">${text}</div>
                <div class="translated-text">Translating...</div>
            `;
            container.appendChild(item);
            container.scrollTop = container.scrollHeight;
        }

        function saveToSheet() {
            alert("수업 데이터가 iROOM 데이터베이스(Google Sheets)로 전송될 준비가 되었습니다!");
        }
    </script>
</body>
</html>
