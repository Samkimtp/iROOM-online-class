<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>iROOM Console - Teacher Mode</title>
    <style>
        :root { --teacher-blue: #007BFF; --student-red: #FF4136; --bg: #f5f7f9; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; display: flex; height: 100vh; background: var(--bg); }
        #control-panel { width: 350px; background: #1a1a1a; color: white; padding: 30px; box-sizing: border-box; }
        #chat-area { flex: 1; display: flex; flex-direction: column; background: white; }
        #transcript-container { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        /* 말풍선 스타일 */
        .msg { padding: 15px; border-radius: 12px; max-width: 80%; line-height: 1.5; position: relative; }
        .msg-T { align-self: flex-end; background: #e7f3ff; border-right: 5px solid var(--teacher-blue); color: #004085; }
        .msg-S { align-self: flex-start; background: #fff1f0; border-left: 5px solid var(--student-red); color: #842029; }
        
        .timestamp { font-size: 0.7rem; color: #999; margin-bottom: 4px; }
        .translated { font-weight: bold; display: block; margin-top: 5px; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 5px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-start { background: var(--teacher-blue); color: white; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <div id="control-panel">
        <h2>iROOM Teacher</h2>
        <p style="font-size:0.8rem; color:#888;">실시간 공유 모드 활성화</p>
        <hr>
        <label>Google Meet URL</label>
        <input type="text" id="meet-url" placeholder="https://meet.google.com/...">
        <label style="margin-top:15px; display:block;">내 언어 (출력 자막)</label>
        <select id="in-lang"><option value="ko">한국어</option><option value="en">영어</option></select>
        <label style="margin-top:15px; display:block;">학생 언어 (번역 자막)</label>
        <select id="out-lang"><option value="th">태국어</option><option value="en">영어</option></select>
        <button class="btn btn-start" onclick="initTeacher()">레슨 시작</button>
    </div>
    <div id="chat-area">
        <div id="transcript-container"></div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzlFaUJmZuSo2I5ekgKcgQLQtJlocsYzbeDaXP05mEmOyHDjGnVTO8E22bEASExk15S/exec";
        const container = document.getElementById('transcript-container');
        let lastTimestamp = null;

        // 1. 내가 말하기 (인식 및 저장)
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        function initTeacher() {
            const url = document.getElementById('meet-url').value;
            if(url) window.open(url, '_blank');
            
            const recog = new Recognition();
            recog.lang = 'ko-KR';
            recog.continuous = true;
            recog.onresult = (e) => {
                const text = e.results[e.results.length-1][0].transcript;
                sendToDB('T', text);
            };
            recog.start();
            
            // 2. 상대방 글 읽어오기 (1.5초 주기 동기화)
            setInterval(syncDB, 1500);
        }

        function sendToDB(user, text) {
            const src = document.getElementById('in-lang').value;
            const tar = document.getElementById('out-lang').value;
            const cb = 'cb_' + Date.now();
            window[cb] = (res) => { delete window[cb]; }; // 저장 완료

            const script = document.createElement('script');
            script.src = `${GAS_URL}?mode=chat&user=${user}&text=${encodeURIComponent(text)}&source=${src}&target=${tar}&callback=${cb}`;
            document.body.appendChild(script);
        }

        function syncDB() {
            const cb = 'sync_' + Date.now();
            window[cb] = (data) => {
                if (data.time !== lastTimestamp) {
                    renderMsg(data.user, data.original, data.translated);
                    lastTimestamp = data.time;
                }
                delete window[cb];
                document.body.removeChild(document.getElementById(cb));
            };
            const script = document.createElement('script');
            script.id = cb;
            script.src = `${GAS_URL}?mode=sync&callback=${cb}`;
            document.body.appendChild(script);
        }

        function renderMsg(user, ori, trans) {
            const div = document.createElement('div');
            div.className = `msg msg-${user}`;
            div.innerHTML = `<div class="timestamp">${user==='T'?'나':'학생'}</div>${ori}<span class="translated">🌐 ${trans}</span>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
