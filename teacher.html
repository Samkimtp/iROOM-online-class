<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>iROOM Live - Teacher</title>
    <style>
        :root { --t-blue: #007BFF; --s-red: #FF4136; --bg: #f0f2f5; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; height: 100vh; }
        #sidebar { width: 300px; background: #1c1e21; color: white; padding: 25px; box-sizing: border-box; }
        #chat-main { flex: 1; display: flex; flex-direction: column; background: white; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        /* 채팅 디자인 */
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 70%; line-height: 1.4; position: relative; font-size: 1rem; }
        .bubble-T { align-self: flex-end; background: var(--t-blue); color: white; border-bottom-right-radius: 2px; }
        .bubble-S { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 2px; }
        
        .trans-text { display: block; font-size: 0.85rem; margin-top: 5px; opacity: 0.9; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 5px; }
        .bubble-S .trans-text { border-top: 1px solid rgba(0,0,0,0.1); color: var(--t-blue); font-weight: bold; }
        
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--t-blue); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>iROOM Room 1</h2>
        <p style="font-size:0.8rem; color:#aaa;">상태: <span id="st-text">대기 중</span></p>
        <label style="font-size:0.75rem;">학생 번역 언어</label>
        <select id="tar-lang" style="width:100%; padding:8px; margin-top:5px; border-radius:5px;">
            <option value="th">태국어 (Thai)</option>
            <option value="en">영어 (English)</option>
        </select>
        <button onclick="startSession()" style="margin-top:20px;">수업 입장 (마이크 켜기)</button>
    </div>
    <div id="chat-main">
        <div id="chat-window"></div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzlFaUJmZuSo2I5ekgKcgQLQtJlocsYzbeDaXP05mEmOyHDjGnVTO8E22bEASExk15S/exec";
        let lastTime = null;
        const windowDiv = document.getElementById('chat-window');

        function startSession() {
            document.getElementById('st-text').innerText = "연결됨";
            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recog = new Recognition();
            recog.lang = 'ko-KR';
            recog.continuous = true;
            recog.onresult = (e) => {
                const text = e.results[e.results.length - 1][0].transcript;
                addBubble('T', text, '번역 중...');
                saveToDB('T', text);
            };
            recog.start();
            setInterval(sync, 1500);
        }

        function saveToDB(user, text) {
            const tar = document.getElementById('tar-lang').value;
            const cb = 'cb_' + Date.now();
            window[cb] = (res) => {
                const bubbles = document.querySelectorAll('.bubble-T');
                bubbles[bubbles.length-1].querySelector('.trans-text').innerText = "🌐 " + res.translated;
                delete window[cb];
            };
            const s = document.createElement('script');
            s.src = `${GAS_URL}?mode=chat&user=${user}&text=${encodeURIComponent(text)}&source=ko&target=${tar}&callback=${cb}`;
            document.body.appendChild(s);
        }

        function sync() {
            const cb = 's_' + Date.now();
            window[cb] = (d) => {
                if (d.user === 'S' && d.time !== lastTime) {
                    addBubble('S', d.original, d.translated);
                    lastTime = d.time;
                }
                delete window[cb];
            };
            const s = document.createElement('script');
            s.src = `${GAS_URL}?mode=sync&callback=${cb}`;
            document.body.appendChild(s);
        }

        function addBubble(user, ori, trans) {
            const div = document.createElement('div');
            div.className = `bubble bubble-${user}`;
            div.innerHTML = `${ori} <span class="trans-text">${user==='T'?trans:'🌐 '+trans}</span>`;
            windowDiv.appendChild(div);
            windowDiv.scrollTop = windowDiv.scrollHeight;
        }
    </script>
</body>
</html>
