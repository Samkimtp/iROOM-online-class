<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>iROOM Live - Teacher</title>
    <style>
        :root { --t-blue: #007BFF; --s-red: #FF4136; --bg: #f0f2f5; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; height: 100vh; }
        #sidebar { width: 300px; background: #1c1e21; color: white; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; }
        #chat-main { flex: 1; display: flex; flex-direction: column; background: white; }
        #chat-window { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 14px 18px; border-radius: 20px; max-width: 75%; line-height: 1.5; font-size: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .bubble-T { align-self: flex-end; background: var(--t-blue); color: white; border-bottom-right-radius: 2px; }
        .bubble-S { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 2px; }
        .trans { display: block; font-size: 0.9rem; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 8px; }
        .bubble-S .trans { border-top: 1px solid rgba(0,0,0,0.1); color: var(--t-blue); font-weight: bold; }
        #user-count { margin-top: auto; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; font-size: 0.9rem; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--t-blue); color: white; font-weight: bold; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="color:var(--t-blue);">iROOM Lesson</h2>
        <p style="font-size:0.85rem; color:#888;">상태: <span id="st-text" style="color:#fff;">대기 중</span></p>
        <label style="font-size:0.8rem; color:#aaa;">학생 번역 언어</label>
        <select id="tar-lang" style="width:100%; padding:10px; margin-top:8px; border-radius:8px; background:#2a2a2a; color:white; border:none;">
            <option value="th">태국어 (Thai)</option>
            <option value="en">영어 (English)</option>
        </select>
        <div id="user-count">👥 현재 접속: <span id="count-num">1</span>명</div>
        <button onclick="startSession()" style="margin-top:15px;">레슨 입장 (마이크 켜기)</button>
    </div>
    <div id="chat-main"><div id="chat-window"></div></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbywWXWw3bOz04ap7HRyHRrj8rXhiRSFpGJCm3o7ZTKw02lJZ2GRZLfumstwZobCj2mS/exec";
        let lastTime = null;
        const windowDiv = document.getElementById('chat-window');

        function startSession() {
            document.getElementById('st-text').innerText = "마이크 가동 중";
            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (Recognition) {
                const recog = new Recognition();
                recog.lang = 'ko-KR';
                recog.continuous = true;
                recog.onresult = (e) => {
                    const text = e.results[e.results.length - 1][0].transcript;
                    addBubble('T', text, '번역 중...');
                    saveToDB('T', text);
                };
                recog.start();
            }
            setInterval(sync, 1500); // 메시지 동기화
            setInterval(checkHB, 15000); // 15초마다 접속 체크
            checkHB();
        }

        function saveToDB(user, text) {
            const tar = document.getElementById('tar-lang').value;
            const cb = 'cb_' + Date.now();
            window[cb] = (res) => {
                const bubbles = document.querySelectorAll('.bubble-T');
                if(bubbles.length > 0) bubbles[bubbles.length-1].querySelector('.trans').innerText = "🌐 " + res.translated;
                delete window[cb];
            };
            const s = document.createElement('script');
            s.src = `${GAS_URL}?mode=chat&user=${user}&text=${encodeURIComponent(text)}&source=ko&target=${tar}&callback=${cb}`;
            document.body.appendChild(s);
        }

        function sync() {
            const cb = 's_' + Date.now();
            window[cb] = (d) => {
                if (d.user === 'S' && d.time !== lastTime) {
                    addBubble('S', d.original, d.translated);
                    lastTime = d.time;
                }
                delete window[cb];
            };
            const s = document.createElement('script');
            s.src = `${GAS_URL}?mode=sync&callback=${cb}`;
            document.body.appendChild(s);
        }

        function checkHB() {
            const cb = 'hb_' + Date.now();
            window[cb] = (res) => {
                document.getElementById('count-num').innerText = res.onlineCount;
                document.getElementById('st-text').innerText = res.otherOnline ? "학생 연결됨" : "학생 대기 중";
                delete window[cb];
            };
            const s = document.createElement('script');
            s.src = `${GAS_URL}?mode=heartbeat&user=T&callback=${cb}`;
            document.body.appendChild(s);
        }

        function addBubble(user, ori, trans) {
            const div = document.createElement('div');
            div.className = `bubble bubble-${user}`;
            div.innerHTML = `${ori} <span class="trans">${user==='T'?trans:'🌐 '+trans}</span>`;
            windowDiv.appendChild(div);
            windowDiv.scrollTop = windowDiv.scrollHeight;
        }
    </script>
</body>
</html>
